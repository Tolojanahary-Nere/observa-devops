# ─────────────────────────────────────────────────────────────────────────────
# nginx/conf.d/api.conf — Virtual host pour l'API FastAPI
# ─────────────────────────────────────────────────────────────────────────────
# Routes :
#   /api/      → FastAPI (routes métier)
#   /health    → FastAPI (health check)
#   /metrics   → BLOQUÉ (accès réservé au réseau interne Prometheus)
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;                  # Accepte tout hostname (à restreindre en prod)

    # ── Security Headers ───────────────────────────────────────────────────────
    # Défense en profondeur : même si un attaquant contourne le proxy,
    # ces headers protègent le navigateur client.
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header X-Frame-Options           "DENY"              always;
    add_header X-XSS-Protection          "1; mode=block"     always;
    add_header Referrer-Policy           "strict-origin"     always;
    add_header Content-Security-Policy   "default-src 'self'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Taille maximale des requêtes ──────────────────────────────────────────
    client_max_body_size 10M;

    # ── Timeouts ──────────────────────────────────────────────────────────────
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # ── Headers transmis au backend ───────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── /metrics : BLOQUÉ depuis l'extérieur ─────────────────────────────────
    # Prometheus scrape directement le service api:8000 via le réseau Docker
    # On interdit l'accès public à cet endpoint sensible.
    location = /metrics {
        deny all;
        return 403 "Accès refusé";
    }

    # ── /health : Health check (accès libre pour les LB) ─────────────────────
    location = /health {
        proxy_pass http://fastapi_backend/health;
        access_log off;            # Pas de logs pour les checks fréquents
    }

    # ── /api/ : API principale avec rate limiting ─────────────────────────────
    location /api/ {
        # Rate limiting : 10 req/s, burst 20, sans délai pour le burst
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://fastapi_backend/api/;

        # WebSocket support (pour futures évolutions)
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
    }

    # ── / : Redirect vers /api/docs ──────────────────────────────────────────
    location = / {
        proxy_pass http://fastapi_backend/;
    }

    # ── Gestion des erreurs ───────────────────────────────────────────────────
    error_page 429 /429.json;
    location = /429.json {
        internal;
        default_type application/json;
        return 429 '{"detail":"Trop de requêtes. Réessayez dans quelques secondes.","type":"rate_limit_exceeded"}';
    }

    error_page 502 503 504 /50x.json;
    location = /50x.json {
        internal;
        default_type application/json;
        return 503 '{"detail":"Service temporairement indisponible.","type":"service_unavailable"}';
    }
}
location / {
    return 200 '{"status":"nginx running"}';
    default_type application/json;
}
