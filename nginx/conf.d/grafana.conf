# ─────────────────────────────────────────────────────────────────────────────
# nginx/conf.d/grafana.conf — Virtual host pour le dashboard Grafana
# ─────────────────────────────────────────────────────────────────────────────
# Grafana est servi sous le sous-chemin /grafana/ du même domaine.
# La variable GF_SERVER_SERVE_FROM_SUB_PATH=true dans docker-compose.yml
# est indispensable pour que Grafana génère les bons liens internes.
#
# Alternative : servir Grafana sur un sous-domaine (grafana.yourdomain.com)
# → Nécessite un certificat wildcard ou un cert dédié.
# ─────────────────────────────────────────────────────────────────────────────

# Note : Ce bloc server est sur le même listener que api.conf.
# En production, séparer sur des server_name distincts avec TLS.

# Bloc de location à inclure dans le server block principal (api.conf)
# ou à placer dans un server block dédié pour un sous-domaine.

# ── Pour un sous-domaine dédié (recommandé en production) ────────────────────
# server {
#     listen 80;
#     server_name grafana.yourdomain.com;
#     ...
# }

# ── Pour un sous-chemin /grafana/ (configuration actuelle) ───────────────────
# À AJOUTER dans le server block de api.conf ou dans un server séparé :

server {
    listen 80;
    server_name monitoring.localhost;  # Changer pour le vrai domaine

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"       always;
    add_header X-Frame-Options         "SAMEORIGIN"    always;  # SAMEORIGIN pour Grafana (iframes internes)
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin" always;

    # ── Restriction d'accès (whitelist IP interne en production) ─────────────
    # Décommenter et adapter pour restreindre l'accès :
    # allow 10.0.0.0/8;
    # allow 192.168.0.0/16;
    # deny all;

    # ── Proxy vers Grafana ────────────────────────────────────────────────────
    location /grafana/ {
        proxy_pass http://grafana_backend/grafana/;

        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        # WebSocket : nécessaire pour Grafana Live (dashboard temps réel)
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";

        proxy_buffering off;       # Désactivé pour les flux temps réel
        proxy_read_timeout 90s;
    }

    # ── Redirect racine vers /grafana/ ────────────────────────────────────────
    location = / {
        return 301 /grafana/;
    }
}
