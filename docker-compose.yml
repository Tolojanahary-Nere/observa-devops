# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Stack complète Observa
# ─────────────────────────────────────────────────────────────────────────────
# Services : api | worker | db | redis | nginx | prometheus | grafana
#
# Bonnes pratiques appliquées :
#   - Toutes les valeurs sensibles via variables d'environnement
#   - Networks isolés (frontend / backend) pour limiter la surface d'attaque
#   - healthcheck sur chaque service pour les depends_on conditionnels
#   - Volumes nommés pour la persistance des données
#   - restart: unless-stopped pour la résilience
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── API FastAPI ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: ${REGISTRY:-ghcr.io/yourusername}/observa-api:${IMAGE_TAG:-latest}
    container_name: observa_api
    restart: unless-stopped
    environment:
      - APP_NAME=Observa API
      - DEBUG=${DEBUG:-false}
      - SECRET_KEY=${SECRET_KEY}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-observa}
      - POSTGRES_USER=${POSTGRES_USER:-observa_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - METRICS_ENABLED=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      timeout: 10s
      interval: 30s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: ${REGISTRY:-ghcr.io/yourusername}/observa-api:${IMAGE_TAG:-latest}
    container_name: observa_worker
    restart: unless-stopped
    # Override la commande par défaut pour lancer Celery
    command: >
      celery -A app.workers.celery_app.celery_app worker
      --loglevel=info
      --concurrency=4
      --max-tasks-per-child=100
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-observa}
      - POSTGRES_USER=${POSTGRES_USER:-observa_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: observa_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-observa}
      - POSTGRES_USER=${POSTGRES_USER:-observa_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-observa_user} -d ${POSTGRES_DB:-observa}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: observa_redis
    restart: unless-stopped
    # Redis sécurisé avec mot de passe si REDIS_PASSWORD est défini
    command: >
      sh -c '
        if [ -n "$$REDIS_PASSWORD" ]; then
          redis-server --requirepass "$$REDIS_PASSWORD" --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
        else
          redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
        fi
      '
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: observa_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - api
      - grafana
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: observa_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"   # Rétention 15 jours
      - "--storage.tsdb.retention.size=1GB"    # Max 1GB de données
      - "--web.enable-lifecycle"               # API reload sans restart
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - backend
    expose:
      - "9090"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: observa_grafana
    restart: unless-stopped
    environment:
      # Sécurité
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_SECURITY_DISABLE_GRAVATAR=true
      # Accès via sous-chemin /grafana/
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      # Analytics désactivées (RGPD)
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - backend
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M


# ── Volumes persistants ────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local


# ── Networks isolés ────────────────────────────────────────────────────────────
networks:
  # Réseau public : Nginx <→ extérieur
  frontend:
    driver: bridge
  # Réseau privé : services internes (API, DB, Redis, monitoring)
  # Nginx peut accéder aux deux réseaux
  backend:
    driver: bridge
    internal: false   # false pour permettre les pull d'images aux workers
