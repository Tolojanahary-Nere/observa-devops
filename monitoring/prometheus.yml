# ─────────────────────────────────────────────────────────────────────────────
# monitoring/prometheus.yml — Configuration de scrape Prometheus
# ─────────────────────────────────────────────────────────────────────────────
# Prometheus scrape = collecte des métriques depuis les targets définies.
#
# Pourquoi 15s ?
#   - Assez fréquent pour détecter un spike en temps quasi-réel
#   - Pas trop fréquent pour ne pas surcharger les services scrappés
#
# Bonnes pratiques appliquées :
#   - Labels `env` et `project` sur tous les services → filtrage en Grafana
#   - Scrape timeout < scrape interval (évite les timeouts en cascade)
# ─────────────────────────────────────────────────────────────────────────────

global:
  scrape_interval:     15s       # Fréquence de collecte
  evaluation_interval: 15s       # Fréquence d'évaluation des règles d'alerte
  scrape_timeout:      10s       # Timeout par scrape (< scrape_interval)

  # Labels globaux ajoutés à toutes les métriques (utile pour le multitenant)
  external_labels:
    env:     'production'
    project: 'observa'

# ── Règles d'alerte (fichiers externes) ──────────────────────────────────────
# rule_files:
#   - /etc/prometheus/rules/*.yml

# ── Alertmanager (décommenter pour activer les alertes) ──────────────────────
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# ── Jobs de scrape ────────────────────────────────────────────────────────────
scrape_configs:

  # ── Prometheus lui-même ────────────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # ── FastAPI Application ────────────────────────────────────────────────────
  # Prometheus accède au service `api` directement via le réseau Docker backend
  # (pas via Nginx → pas de rate limiting sur /metrics)
  - job_name: 'fastapi'
    metrics_path: '/metrics'
    scrape_interval: 15s
    static_configs:
      - targets: ['api:8000']
        labels:
          service:  'fastapi'
          language: 'python'

  # ── Redis Exporter ─────────────────────────────────────────────────────────
  # Note : nécessite d'ajouter redis_exporter comme service Docker
  # Image : oliver006/redis_exporter:latest
  # Métriques : mémoire, ops/s, hits/misses, connexions
  - job_name: 'redis'
    metrics_path: '/metrics'
    scrape_interval: 30s
    static_configs:
      - targets: ['redis:6379']
        labels:
          service: 'redis'
    # Pour redis_exporter (décommenter si ajouté au docker-compose) :
    # static_configs:
    #   - targets: ['redis_exporter:9121']

  # ── PostgreSQL Exporter ────────────────────────────────────────────────────
  # Note : nécessite d'ajouter postgres_exporter comme service Docker
  # Image : prometheuscommunity/postgres-exporter
  # - job_name: 'postgresql'
  #   static_configs:
  #     - targets: ['postgres_exporter:9187']
  #       labels:
  #         service: 'postgresql'

