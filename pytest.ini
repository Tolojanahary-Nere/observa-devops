[pytest]
# ─────────────────────────────────────────────────────────────────────────────
# pytest.ini — Configuration centrale de pytest
# ─────────────────────────────────────────────────────────────────────────────
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Affichage
addopts =
    -v
    --tb=short
    --strict-markers
    --no-header

# Markers personnalisés (évite les warnings "unknown marker")
markers =
    unit: Tests unitaires rapides (sans dépendances externes)
    integration: Tests d'intégration (avec DB ou services)
    slow: Tests lents (> 1 seconde)

# Filtres de warnings
filterwarnings =
    ignore::DeprecationWarning:sqlalchemy.*:
    ignore::PendingDeprecationWarning
